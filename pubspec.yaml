name: monkeysplanetios
description: "猴哥星球 iOS 版 - 考研刷题助手"
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # HTTP 客户端
  dio: ^5.7.0
  # 状态管理
  provider: ^6.1.2
  # 本地存储
  shared_preferences: ^2.3.4
  # 安全存储（Token）
  flutter_secure_storage: ^9.2.4
  # WebView 渲染 HTML
  webview_flutter: ^4.10.0
  # 图片缓存加载
  cached_network_image: ^3.4.1
  # 日期格式化
  intl: ^0.19.0
  # MD5 加密
  crypto: ^3.0.6
  # 加密库
  pointycastle: ^3.9.1
  # URL 启动
  url_launcher: ^6.3.1
  # 图片选择
  image_picker: ^1.1.2
  # iOS 设备信息
  device_info_plus: ^10.1.0
  # 获取 App 版本信息
  package_info_plus: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
